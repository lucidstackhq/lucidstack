<!doctype html>
<html lang="en">
[[template "header.html" .]]
<body>
[[template "navbar.html" .]]
<div class="container">
    <div class="row" style="margin-top: 2rem">
        <div class="col-lg-8 offset-lg-2">
            <div class="row">
                <div class="col-lg-8">
                    <h5 style="color: #999">Properties</h5>
                    <h2 id="model-name"></h2>
                </div>
                <div class="col-lg-4">
                    <button class="btn btn-primary float-end" data-bs-toggle="modal" data-bs-target="#add-property-modal">Add Property</button>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-12">
                    <hr>
                    <table class="table table-hover">
                        <thead>
                        <tr>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Schema</th>
                            <th>Default Value</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody id="properties"></tbody>
                    </table>
                    <button class="btn btn-outline-secondary w-100" id="load-more-btn">Load More Properties</button>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade modal-lg" id="add-property-modal">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Property</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true"></span>
                </button>
            </div>
            <div class="modal-body">
                <div id="add-property-message"></div>
                <form>
                    <div class="mb-3 form-floating">
                        <input type="text" class="form-control" id="name" placeholder="Name">
                        <label for="name" class="form-label">Name</label>
                    </div>
                    <div class="mb-3 form-floating">
                        <textarea class="form-control" id="description" placeholder="Description" style="height: 100px"></textarea>
                        <label for="description" class="form-label">Description</label>
                    </div>
                    <div id="add-property-data-schema"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="add-property-btn">Add Property</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
[[template "footer.html" .]]
[[template "data-schema.html" .]]
<script type="text/javascript">
    const modelId = "[[.model_id]]"

    $(document).ready(function () {
        getModel(modelId ,function (data) {
            $("#model-name").html(data.name)
        })

        $("#add-property-data-schema").html(dataSchemaInputTemplate({id: "data", "title": "Data Schema"}))
    })
</script>
</body>
</html>
